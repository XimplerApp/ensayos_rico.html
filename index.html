<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro de Ensayos - Galera</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root{
      --bg:#0f172a; --card:#1e293b; --line:#334155; --text:#e2e8f0;
      --muted:#94a3b8; --primary:#38bdf8; --danger:#ef4444; --success:#22c55e; --warn:#f59e0b;
    }
    *{box-sizing:border-box}
    body{font-family:Arial,sans-serif;background:var(--bg);color:var(--text);padding:20px}
    h1{color:var(--primary);margin-top:0}
    h2{margin-top:0}
    .container{max-width:1200px;margin:auto}
    .card{background:var(--card);padding:20px;border-radius:12px;margin-bottom:20px;border:1px solid var(--line)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
    input,select,button{width:100%;padding:10px;border-radius:8px;border:none}
    input,select{margin-top:6px;background:#fff;color:#111827}
    label{display:block;font-size:14px;color:var(--muted);margin-top:6px}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .actions button,.nav button{width:auto}
    button{background:var(--primary);cursor:pointer;font-weight:700}
    .danger{background:var(--danger);color:#fff}
    .export{background:var(--success);color:#fff}
    .edit{background:var(--warn);color:#111827}
    .nav{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
    .nav a{text-decoration:none}
    table{width:100%;border-collapse:collapse;margin-top:12px}
    th,td{padding:10px;border:1px solid var(--line);text-align:center}
    th{background:#0b1220}
    .summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
    .mini{background:#0b1220;border:1px solid var(--line);border-radius:10px;padding:14px}
    .mini b{display:block;font-size:22px;color:var(--primary);margin-top:4px}
    .muted{color:var(--muted)}
  </style>
</head>
<body>
<div class="container">
  <div class="nav">
    <a href="index.html"><button>📋 Ensayos</button></a>
    <a href="bitacora.html"><button>📸 Bitácora</button></a>
    <a href="resultados.html"><button>📊 Resultados</button></a>
    <a href="pipeline.html"><button>🌱 Pipeline</button></a>
    <a href="tablero.html"><button>🧠 Tablero</button></a>
    <a href="inteligencia.html"><button>🚀 Inteligencia</button></a>
    <a href="innovacion.html"><button>🧬 Innovación</button></a>
  </div>

  <h1>🚀 Registro de Ensayos - Galera</h1>

  <div class="card">
    <h2 id="modo">Nuevo Ensayo</h2>
    <div class="grid">
      <div><label>Técnico responsable</label><input id="tecnico" placeholder="Ej. Ing. López"></div>
      <div><label>Región</label><input id="region" placeholder="Ej. Bajío"></div>
      <div><label>Cultivo</label><input id="cultivo" placeholder="Ej. Tomate"></div>
      <div><label>Objetivo</label><input id="objetivo" placeholder="Ej. +12% vs control"></div>

      <div><label>Ciclo agrícola</label><input id="ciclo" placeholder="Ej. Otoño-Invierno"></div>
      <div>
        <label>Tipo de sistema</label>
        <select id="sistema">
          <option value="Campo abierto">Campo abierto</option>
          <option value="Invernadero">Invernadero</option>
        </select>
      </div>
      <div><label>Tipo de suelo</label><input id="suelo" placeholder="Ej. Franco arenoso"></div>
      <div><label>Sistema de riego</label><input id="riego" placeholder="Ej. Goteo"></div>

      <div><label>Fecha siembra</label><input type="date" id="siembra"></div>
      <div><label>Fecha estimada cosecha</label><input type="date" id="cosecha"></div>
      <div><label>Variedad tratada</label><input id="variedadTratada" placeholder="Ej. Dumas"></div>
      <div><label>Variedad control</label><input id="variedadControl" placeholder="Ej. Competidor"></div>

      <div><label>Proveedor control</label><input id="proveedor" placeholder="Ej. Proveedor X"></div>
      <div><label>Superficie ensayo</label><input id="superficie" placeholder="Ej. 0.5 ha"></div>
      <div><label>Productor</label><input id="productor" placeholder="Ej. Productor Gómez"></div>
      <div>
        <label>Estado</label>
        <select id="estado">
          <option value="Planeado">Planeado</option>
          <option value="Activo">Activo</option>
          <option value="Terminado">Terminado</option>
        </select>
      </div>
    </div>

    <div class="actions">
      <button onclick="guardar()">Guardar Ensayo</button>
      <button class="edit" onclick="cancelarEdicion()" id="btnCancelar" style="display:none;">Cancelar edición</button>
    </div>
  </div>

  <div class="card">
    <h2>Resumen rápido</h2>
    <div class="summary" id="resumen"></div>
  </div>

  <div class="card">
    <h2>Ensayos Registrados</h2>
    <div class="actions">
      <button class="export" onclick="exportarExcel()">📊 Exportar a Excel</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Cultivo</th>
          <th>Variedad</th>
          <th>Región</th>
          <th>Estado</th>
          <th>Fecha siembra</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tabla"></tbody>
    </table>
  </div>
</div>

<script>
  const $ = id => document.getElementById(id);

  function getData(key){
    try{ return JSON.parse(localStorage.getItem(key)) || []; }
    catch(e){ return []; }
  }
  function saveData(key, data){
    localStorage.setItem(key, JSON.stringify(data));
  }
  function formatDate(iso){
    if(!iso) return "";
    const d = new Date(iso + "T00:00:00");
    if(isNaN(d)) return iso;
    return d.toLocaleDateString("es-MX");
  }

  let ensayos = getData("ensayos");
  let editId = null;

  function limpiarFormulario(){
    editId = null;
    $("modo").innerText = "Nuevo Ensayo";
    $("btnCancelar").style.display = "none";
    ["tecnico","region","cultivo","objetivo","ciclo","suelo","riego","siembra","cosecha","variedadTratada","variedadControl","proveedor","superficie","productor"].forEach(id => $(id).value = "");
    $("sistema").value = "Campo abierto";
    $("estado").value = "Planeado";
  }

  function cancelarEdicion(){
    limpiarFormulario();
  }

  function editar(id){
    const e = ensayos.find(x => x.id === id);
    if(!e) return;
    editId = id;
    $("modo").innerText = "Editar Ensayo";
    $("btnCancelar").style.display = "inline-block";

    $("tecnico").value = e.tecnico || "";
    $("region").value = e.region || "";
    $("cultivo").value = e.cultivo || "";
    $("objetivo").value = e.objetivo || "";
    $("ciclo").value = e.ciclo || "";
    $("sistema").value = e.sistema || "Campo abierto";
    $("suelo").value = e.suelo || "";
    $("riego").value = e.riego || "";
    $("siembra").value = e.fecha_siembra || "";
    $("cosecha").value = e.fecha_cosecha || "";
    $("variedadTratada").value = e.variedad_tratada || "";
    $("variedadControl").value = e.variedad_control || "";
    $("proveedor").value = e.proveedor_control || "";
    $("superficie").value = e.superficie || "";
    $("productor").value = e.productor || "";
    $("estado").value = e.estado || "Planeado";
    window.scrollTo({top:0, behavior:"smooth"});
  }

  function guardar(){
    const nowIso = new Date().toISOString();
    const ensayo = {
      id: editId || Date.now(),
      tecnico: $("tecnico").value.trim(),
      region: $("region").value.trim(),
      cultivo: $("cultivo").value.trim(),
      objetivo: $("objetivo").value.trim(),
      ciclo: $("ciclo").value.trim(),
      sistema: $("sistema").value,
      suelo: $("suelo").value.trim(),
      riego: $("riego").value.trim(),
      fecha_siembra: $("siembra").value,
      fecha_cosecha: $("cosecha").value,
      variedad_tratada: $("variedadTratada").value.trim(),
      variedad_control: $("variedadControl").value.trim(),
      proveedor_control: $("proveedor").value.trim(),
      superficie: $("superficie").value.trim(),
      productor: $("productor").value.trim(),
      estado: $("estado").value,
      fecha_alta_iso: editId ? (ensayos.find(x => x.id === editId)?.fecha_alta_iso || nowIso) : nowIso,
      fecha_actualizacion_iso: nowIso
    };

    if(!ensayo.cultivo || !ensayo.variedad_tratada || !ensayo.region){
      alert("Captura al menos cultivo, variedad tratada y región.");
      return;
    }

    if(editId){
      ensayos = ensayos.map(x => x.id === editId ? ensayo : x);
    }else{
      ensayos.push(ensayo);
    }

    saveData("ensayos", ensayos);
    limpiarFormulario();
    render();
  }

  function eliminar(id){
    if(!confirm("¿Eliminar este ensayo?")) return;
    ensayos = ensayos.filter(e => e.id !== id);
    saveData("ensayos", ensayos);
    render();
  }

  function renderResumen(){
    const total = ensayos.length;
    const planeados = ensayos.filter(e => e.estado === "Planeado").length;
    const activos = ensayos.filter(e => e.estado === "Activo").length;
    const terminados = ensayos.filter(e => e.estado === "Terminado").length;

    $("resumen").innerHTML = `
      <div class="mini">Total ensayos<b>${total}</b></div>
      <div class="mini">Planeados<b>${planeados}</b></div>
      <div class="mini">Activos<b>${activos}</b></div>
      <div class="mini">Terminados<b>${terminados}</b></div>
    `;
  }

  function render(){
    const tabla = $("tabla");
    tabla.innerHTML = "";

    ensayos
      .slice()
      .sort((a,b) => (b.fecha_alta_iso || "").localeCompare(a.fecha_alta_iso || ""))
      .forEach(e => {
        tabla.innerHTML += `
          <tr>
            <td>${e.id}</td>
            <td>${e.cultivo || ""}</td>
            <td>${e.variedad_tratada || ""}</td>
            <td>${e.region || ""}</td>
            <td>${e.estado || ""}</td>
            <td>${formatDate(e.fecha_siembra)}</td>
            <td>
              <div class="actions" style="justify-content:center;">
                <button class="edit" onclick="editar(${e.id})">Editar</button>
                <button class="danger" onclick="eliminar(${e.id})">Eliminar</button>
              </div>
            </td>
          </tr>
        `;
      });

    renderResumen();
  }

  function exportarExcel(){
    const data = ensayos.map(e => ({
      "ID Ensayo": e.id,
      "Técnico": e.tecnico,
      "Región": e.region,
      "Cultivo": e.cultivo,
      "Objetivo": e.objetivo,
      "Ciclo": e.ciclo,
      "Sistema": e.sistema,
      "Suelo": e.suelo,
      "Riego": e.riego,
      "Fecha Siembra": e.fecha_siembra,
      "Fecha Cosecha": e.fecha_cosecha,
      "Variedad Tratada": e.variedad_tratada,
      "Variedad Control": e.variedad_control,
      "Proveedor Control": e.proveedor_control,
      "Superficie": e.superficie,
      "Productor": e.productor,
      "Estado": e.estado,
      "Fecha Alta ISO": e.fecha_alta_iso || "",
      "Fecha Actualización ISO": e.fecha_actualizacion_iso || ""
    }));

    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Ensayos");
    XLSX.writeFile(wb, "Ensayos_Galera_Ajustado.xlsx");
  }

  render();
</script>
</body>
</html>
