<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Resultados de Ensayos - Galera</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root{
      --bg:#0f172a;
      --card:#1e293b;
      --line:#334155;
      --text:#e2e8f0;
      --muted:#94a3b8;
      --primary:#38bdf8;
      --danger:#ef4444;
      --success:#22c55e;
      --warn:#f59e0b;
      --yellow:#facc15;
    }
    *{box-sizing:border-box}
    body{
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      padding:20px;
      margin:0;
    }
    h1{color:var(--primary);margin-top:0}
    h2,h3{margin-top:0}
    .container{max-width:1280px;margin:auto}
    .card{
      background:var(--card);
      padding:20px;
      border-radius:12px;
      margin-bottom:20px;
      border:1px solid var(--line);
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:12px;
    }
    label{
      display:block;
      font-size:14px;
      color:var(--muted);
      margin-top:6px;
    }
    input,select,button{
      width:100%;
      padding:10px;
      border-radius:8px;
      border:none;
    }
    input,select{
      margin-top:6px;
      background:#fff;
      color:#111827;
    }
    button{
      background:var(--primary);
      cursor:pointer;
      font-weight:700;
      color:#082f49;
    }
    .save{background:var(--success);color:#fff}
    .delete{background:var(--danger);color:#fff}
    .edit{background:var(--warn);color:#111827}
    .export{background:var(--success);color:#fff}
    .nav{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }
    .nav a{text-decoration:none}
    .nav button,.actions button{width:auto}
    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    .kpi{
      font-size:18px;
      margin:8px 0;
      line-height:1.45;
    }
    .green{color:var(--success)}
    .red{color:var(--danger)}
    .yellow{color:var(--yellow)}
    .muted{color:var(--muted)}
    .result-card{
      background:#0b1220;
      border:1px solid var(--line);
      border-radius:12px;
      padding:16px;
      margin-top:12px;
    }
    .mini{
      background:#0b1220;
      border:1px solid var(--line);
      border-radius:10px;
      padding:14px;
    }
    .mini b{
      display:block;
      font-size:20px;
      color:var(--primary);
      margin-top:4px;
    }
    .badge{
      display:inline-block;
      padding:4px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      border:1px solid var(--line);
      background:#111827;
      color:var(--muted);
      margin-left:8px;
    }
    .context-box{
      background:#0b1220;
      border:1px solid var(--line);
      border-radius:12px;
      padding:16px;
      margin-top:14px;
    }
    hr{
      border:none;
      border-top:1px solid var(--line);
      margin:14px 0;
    }
    .empty{
      color:var(--muted);
      font-style:italic;
    }
  </style>
</head>
<body>
<div class="container">

  <div class="nav">
    <a href="index.html"><button>📋 Ensayos</button></a>
    <a href="bitacora.html"><button>📸 Bitácora</button></a>
    <a href="resultados.html"><button>📊 Resultados</button></a>
    <a href="pipeline.html"><button>🌱 Pipeline</button></a>
    <a href="tablero.html"><button>🧠 Tablero</button></a>
    <a href="inteligencia.html"><button>🚀 Inteligencia</button></a>
    <a href="innovacion.html"><button>🧬 Innovación</button></a>
  </div>

  <h1>📊 Resultados de Ensayos</h1>

  <div class="card">
    <h2 id="modo">Nueva Evaluación</h2>

    <div class="grid">
      <div>
        <label>Ensayo</label>
        <select id="ensayoSelect"></select>
      </div>
      <div>
        <label>Fecha de evaluación</label>
        <input type="date" id="fechaEvaluacion">
      </div>
    </div>

    <div id="contextoEnsayo" class="context-box"></div>

    <h3 style="margin-top:20px;">Resultados Técnicos</h3>
    <div class="grid">
      <div>
        <label>Rendimiento Control (ton/ha)</label>
        <input id="rendControl" placeholder="Ej. 5.2">
      </div>
      <div>
        <label>Rendimiento Tratado (ton/ha)</label>
        <input id="rendTratado" placeholder="Ej. 6.1">
      </div>
      <div>
        <label>Calidad comercial</label>
        <input id="calidadComercial" placeholder="Ej. Calibre exportable alto">
      </div>
      <div>
        <label>Incidencia de plaga (%)</label>
        <input id="incidenciaPlaga" placeholder="Ej. 4">
      </div>
    </div>

    <h3 style="margin-top:20px;">Costos del Ensayo</h3>
    <div class="grid">
      <div>
        <label>Semillas $</label>
        <input id="semillas" placeholder="Ej. 3500">
      </div>
      <div>
        <label>Insumos $</label>
        <input id="insumos" placeholder="Ej. 2200">
      </div>
      <div>
        <label>Material $</label>
        <input id="material" placeholder="Ej. 800">
      </div>
      <div>
        <label>Horas técnico</label>
        <input id="horas" placeholder="Ej. 12">
      </div>
      <div>
        <label>Costo por hora $</label>
        <input id="costoHora" placeholder="Ej. 250">
      </div>
      <div>
        <label>Traslados $</label>
        <input id="traslados" placeholder="Ej. 900">
      </div>
      <div>
        <label>Otros $</label>
        <input id="otros" placeholder="Ej. 450">
      </div>
    </div>

    <h3 style="margin-top:20px;">Mercado</h3>
    <div class="grid">
      <div>
        <label>Precio por kg $</label>
        <input id="precio" placeholder="Ej. 16.5">
      </div>
      <div>
        <label>Costo de producción por kg $</label>
        <input id="costoProduccion" placeholder="Ej. 10.2">
      </div>
    </div>

    <div class="actions">
      <button onclick="calcular()">Calcular + Evaluar</button>
      <button class="save" onclick="guardar()">Guardar evaluación</button>
      <button class="edit" id="btnCancelar" onclick="cancelarEdicion()" style="display:none;">Cancelar edición</button>
      <button class="export" onclick="exportarExcel()">📊 Exportar Excel</button>
    </div>

    <div id="kpis" style="margin-top:18px;"></div>
  </div>

  <div class="card">
    <h2>Historial de Evaluaciones</h2>
    <div class="muted">Ahora se guardan múltiples evaluaciones por ensayo, con diferentes fechas.</div>
    <div id="lista"></div>
  </div>

</div>

<script>
  const $ = id => document.getElementById(id);

  function getData(key){
    try { return JSON.parse(localStorage.getItem(key)) || []; }
    catch(e){ return []; }
  }

  function saveData(key, data){
    localStorage.setItem(key, JSON.stringify(data));
  }

  function ensayoLabel(e){
    return `${e.id} | ${e.cultivo || ""} | ${e.variedad_tratada || ""} | ${e.productor || ""}`;
  }

  function formatMoney(n){
    return "$" + new Intl.NumberFormat("es-MX", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    }).format(Number(n || 0));
  }

  function formatPct(n){
    return new Intl.NumberFormat("es-MX", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    }).format(Number(n || 0)) + "%";
  }

  function formatNum(n){
    return new Intl.NumberFormat("es-MX", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    }).format(Number(n || 0));
  }

  function formatDate(iso){
    if(!iso) return "";
    const d = new Date(iso + "T00:00:00");
    if(isNaN(d)) return iso;
    return d.toLocaleDateString("es-MX");
  }

  function parseNumber(value){
    if(value === null || value === undefined) return 0;
    const clean = String(value).trim().replace(/,/g, "");
    const num = parseFloat(clean);
    return isNaN(num) ? 0 : num;
  }

  function parseSurfaceHa(value){
    if(value === null || value === undefined) return 0;
    const text = String(value).trim().toLowerCase().replace(/,/g, "");
    const match = text.match(/(\d+(\.\d+)?)/);
    return match ? parseFloat(match[1]) : 0;
  }

  function todayISO(){
    return new Date().toISOString().slice(0,10);
  }

  let ensayos = getData("ensayos");
  let resultados = getData("resultados");
  let oportunidades = getData("oportunidades");
  let editId = null;
  let tmp = null;

  const metasROI = {
    "tomate": 0.25,
    "pimiento": 0.30,
    "chile": 0.30,
    "cebolla": 0.20,
    "pepino": 0.25,
    "calabaza": 0.22,
    "sandia": 0.20,
    "melón": 0.20
  };

  function getEnsayoById(id){
    return ensayos.find(e => String(e.id) === String(id)) || null;
  }

  function getMetaROI(cultivo){
    const key = String(cultivo || "").trim().toLowerCase();
    return metasROI[key] ?? 0.30;
  }

  function getPotentialSurface(ensayoId){
    const lista = oportunidades.filter(o => String(o.ensayo) === String(ensayoId));
    return lista.reduce((acc, o) => {
      return acc + Number(o.superficiePotencial || o.area || 0);
    }, 0);
  }

  function countEvaluacionesEnsayo(ensayoId){
    return resultados.filter(r => String(r.ensayo_id) === String(ensayoId)).length;
  }

  function cargarEnsayos(){
    ensayos = getData("ensayos");
    $("ensayoSelect").innerHTML = "";

    ensayos.forEach(e => {
      $("ensayoSelect").innerHTML += `<option value="${e.id}">${ensayoLabel(e)}</option>`;
    });

    if(ensayos.length){
      mostrarContextoEnsayo();
    } else {
      $("contextoEnsayo").innerHTML = `<p class="empty">No hay ensayos capturados todavía.</p>`;
    }
  }

  function mostrarContextoEnsayo(){
    const ensayo = getEnsayoById($("ensayoSelect").value);

    if(!ensayo){
      $("contextoEnsayo").innerHTML = `<p class="empty">Selecciona un ensayo.</p>`;
      return;
    }

    const superficieEnsayoHa = parseSurfaceHa(ensayo.superficie);
    const superficiePotencial = getPotentialSurface(ensayo.id);
    const metaROI = getMetaROI(ensayo.cultivo);
    const evaluaciones = countEvaluacionesEnsayo(ensayo.id);

    $("contextoEnsayo").innerHTML = `
      <div class="grid">
        <div class="mini">
          <div>Folio</div>
          <b>${ensayo.id}</b>
        </div>
        <div class="mini">
          <div>Objetivo del ensayo</div>
          <b style="font-size:16px;">${ensayo.objetivo || "Sin objetivo"}</b>
        </div>
        <div class="mini">
          <div>Superficie del ensayo</div>
          <b>${superficieEnsayoHa > 0 ? formatNum(superficieEnsayoHa) + " ha" : "No definida"}</b>
        </div>
        <div class="mini">
          <div>Superficie potencial productor</div>
          <b>${superficiePotencial > 0 ? formatNum(superficiePotencial) + " ha" : "N/D"}</b>
        </div>
        <div class="mini">
          <div>Meta ROI cultivo</div>
          <b>${formatPct(metaROI * 100)}</b>
        </div>
        <div class="mini">
          <div>Evaluaciones históricas</div>
          <b>${evaluaciones}</b>
        </div>
      </div>
    `;
  }

  function analyzeObjective(objetivo, porcentaje, rendTratado, calidadComercial){
    if(!objetivo || !String(objetivo).trim()){
      return {
        estado: "Sin objetivo definido",
        clase: "muted",
        detalle: "No existe objetivo capturado en la ficha del ensayo."
      };
    }

    const txt = String(objetivo).toLowerCase();
    const pctMatch = String(objetivo).match(/(\d+(?:[.,]\d+)?)\s*%/);
    const tonMatch = String(objetivo).match(/(\d+(?:[.,]\d+)?)\s*(?:ton\/ha|t\/ha)/i);

    if(pctMatch && (txt.includes("control") || txt.includes("mejor") || txt.includes("increment"))){
      const meta = parseFloat(String(pctMatch[1]).replace(",", "."));
      const cumplido = porcentaje >= meta;

      return {
        estado: cumplido ? "Cumplido" : "No cumplido",
        clase: cumplido ? "green" : "red",
        detalle: `Objetivo prometido: +${formatNum(meta)}% vs control | Resultado real: ${formatPct(porcentaje)}`
      };
    }

    if(tonMatch && txt.includes("rend")){
      const metaTon = parseFloat(String(tonMatch[1]).replace(",", "."));
      const cumplido = rendTratado >= metaTon;

      return {
        estado: cumplido ? "Cumplido" : "No cumplido",
        clase: cumplido ? "green" : "red",
        detalle: `Objetivo prometido: ${formatNum(metaTon)} ton/ha | Resultado real: ${formatNum(rendTratado)} ton/ha`
      };
    }

    if((txt.includes("calidad") || txt.includes("calibre")) && calidadComercial){
      return {
        estado: "Revisión cualitativa",
        clase: "yellow",
        detalle: `Objetivo prometido: ${objetivo} | Resultado capturado: ${calidadComercial}`
      };
    }

    return {
      estado: "Validación manual",
      clase: "yellow",
      detalle: `Objetivo prometido: ${objetivo} | Resultado real: ${formatPct(porcentaje)} de mejora`
    };
  }

  function evaluar(roi, diferencia, metaROI){
    if(diferencia < 0){
      return {
        evaluacion: "No exitoso",
        recomendacion: "Detener inmediatamente",
        repetir: "No"
      };
    }

    if(roi < 0){
      return {
        evaluacion: "No exitoso",
        recomendacion: "No escalar, revisar causa",
        repetir: "No"
      };
    }

    if(roi < metaROI){
      return {
        evaluacion: "Parcial",
        recomendacion: "Ajustar variables",
        repetir: "Sí"
      };
    }

    return {
      evaluacion: "Exitoso",
      recomendacion: "Escalar comercialmente",
      repetir: "Sí"
    };
  }

  function calcular(){
    const ensayo = getEnsayoById($("ensayoSelect").value);
    if(!ensayo){
      alert("Selecciona un ensayo válido.");
      return;
    }

    const superficieEnsayoHa = parseSurfaceHa(ensayo.superficie);
    if(superficieEnsayoHa <= 0){
      alert("La ficha del ensayo no tiene una superficie válida. Captura una superficie del ensayo en index.html para poder calcular el ROI real.");
      return;
    }

    const superficiePotencialHa = getPotentialSurface(ensayo.id);
    const metaROI = getMetaROI(ensayo.cultivo);

    const rc = parseNumber($("rendControl").value);
    const rt = parseNumber($("rendTratado").value);

    const semillasVal = parseNumber($("semillas").value);
    const ins = parseNumber($("insumos").value);
    const mat = parseNumber($("material").value);
    const hrs = parseNumber($("horas").value);
    const costoHr = parseNumber($("costoHora").value);
    const tras = parseNumber($("traslados").value);
    const otr = parseNumber($("otros").value);

    const precioVal = parseNumber($("precio").value);
    const costoProd = parseNumber($("costoProduccion").value);

    const calidadComercial = $("calidadComercial").value.trim();
    const incidenciaPlaga = parseNumber($("incidenciaPlaga").value);

    const costoHoras = hrs * costoHr;
    const diferencia = rt - rc;
    const porcentaje = rc ? (diferencia / rc) * 100 : 0;
    const diferenciaKgHa = diferencia * 1000;
    const margenUnitario = precioVal - costoProd;

    const margenPorHa = diferenciaKgHa * margenUnitario;
    const margenEnsayo = margenPorHa * superficieEnsayoHa;
    const proyeccionPotencial = superficiePotencialHa > 0 ? margenPorHa * superficiePotencialHa : 0;

    const costoTotal = semillasVal + ins + mat + costoHoras + tras + otr;
    const roi = costoTotal ? (margenEnsayo - costoTotal) / costoTotal : 0;

    const analisisObjetivo = analyzeObjective(
      ensayo.objetivo,
      porcentaje,
      rt,
      calidadComercial
    );

    const decision = evaluar(roi, diferencia, metaROI);

    tmp = {
      objetivoEnsayo: ensayo.objetivo || "",
      superficieEnsayoHa,
      superficiePotencialHa,
      metaROICultivo: metaROI,
      rendControl: rc,
      rendTratado: rt,
      calidadComercial,
      incidenciaPlaga,
      semillas: semillasVal,
      insumos: ins,
      material: mat,
      horas: hrs,
      costoHora: costoHr,
      costoHoras,
      traslados: tras,
      otros: otr,
      precio: precioVal,
      costoProduccion: costoProd,
      diferencia,
      diferenciaKgHa,
      porcentaje,
      margenUnitario,
      margenPorHa,
      margenEnsayo,
      proyeccionPotencial,
      costoTotal,
      roi,
      objetivoEstado: analisisObjetivo.estado,
      objetivoDetalle: analisisObjetivo.detalle,
      objetivoClase: analisisObjetivo.clase,
      ...decision
    };

    const roiClass = roi >= metaROI ? "green" : roi >= 0 ? "yellow" : "red";

    $("kpis").innerHTML = `
      <div class="kpi">🎯 Objetivo del ensayo: <b>${ensayo.objetivo || "Sin objetivo"}</b></div>
      <div class="kpi ${analisisObjetivo.clase}">Objetivo prometido vs resultado real: <b>${analisisObjetivo.estado}</b></div>
      <div class="kpi ${analisisObjetivo.clase}">${analisisObjetivo.detalle}</div>
      <hr>
      <div class="kpi">📈 Diferencia: <b>${formatNum(diferencia)} ton/ha</b></div>
      <div class="kpi">📊 Mejora vs control: <b>${formatPct(porcentaje)}</b></div>
      <div class="kpi">🌾 Rendimiento tratado: <b>${formatNum(rt)} ton/ha</b></div>
      <div class="kpi">🌱 Rendimiento control: <b>${formatNum(rc)} ton/ha</b></div>
      <div class="kpi">📏 Superficie ensayo: <b>${formatNum(superficieEnsayoHa)} ha</b></div>
      <div class="kpi">📏 Superficie potencial productor: <b>${superficiePotencialHa > 0 ? formatNum(superficiePotencialHa) + " ha" : "N/D"}</b></div>
      <div class="kpi">💰 Margen incremental por ha: <b>${formatMoney(margenPorHa)}</b></div>
      <div class="kpi">💰 Margen incremental total del ensayo: <b>${formatMoney(margenEnsayo)}</b></div>
      <div class="kpi">🚀 Impacto potencial proyectado: <b>${superficiePotencialHa > 0 ? formatMoney(proyeccionPotencial) : "N/D"}</b></div>
      <div class="kpi">💸 Costo total ensayo: <b>${formatMoney(costoTotal)}</b></div>
      <div class="kpi ${roiClass}">ROI real del ensayo: <b>${formatPct(roi * 100)}</b> <span class="badge">Meta cultivo: ${formatPct(metaROI * 100)}</span></div>
      <hr>
      <div class="kpi">📊 Evaluación: <b>${decision.evaluacion}</b></div>
      <div class="kpi">🧠 Recomendación: <b>${decision.recomendacion}</b></div>
      <div class="kpi">🔁 Repetir ensayo: <b>${decision.repetir}</b></div>
    `;
  }

  function limpiarFormulario(){
    editId = null;
    tmp = null;
    $("modo").innerText = "Nueva Evaluación";
    $("btnCancelar").style.display = "none";
    $("fechaEvaluacion").value = todayISO();

    [
      "rendControl","rendTratado","calidadComercial","incidenciaPlaga",
      "semillas","insumos","material","horas","costoHora","traslados","otros",
      "precio","costoProduccion"
    ].forEach(id => $(id).value = "");

    $("kpis").innerHTML = "";
    mostrarContextoEnsayo();
  }

  function cancelarEdicion(){
    limpiarFormulario();
  }

  function cargarResultadoEnFormulario(r){
    $("fechaEvaluacion").value = r.fechaEvaluacion || todayISO();
    $("rendControl").value = r.rendControl ?? "";
    $("rendTratado").value = r.rendTratado ?? "";
    $("calidadComercial").value = r.calidadComercial ?? "";
    $("incidenciaPlaga").value = r.incidenciaPlaga ?? "";
    $("semillas").value = r.semillas ?? "";
    $("insumos").value = r.insumos ?? "";
    $("material").value = r.material ?? "";
    $("horas").value = r.horas ?? "";
    $("costoHora").value = r.costoHora ?? "";
    $("traslados").value = r.traslados ?? "";
    $("otros").value = r.otros ?? "";
    $("precio").value = r.precio ?? "";
    $("costoProduccion").value = r.costoProduccion ?? "";

    tmp = { ...r };

    const roiClass = Number(r.roi || 0) >= Number(r.metaROICultivo || 0.3) ? "green" : Number(r.roi || 0) >= 0 ? "yellow" : "red";

    $("kpis").innerHTML = `
      <div class="kpi">🎯 Objetivo del ensayo: <b>${r.objetivoEnsayo || "Sin objetivo"}</b></div>
      <div class="kpi ${r.objetivoClase || 'yellow'}">Objetivo prometido vs resultado real: <b>${r.objetivoEstado || "N/D"}</b></div>
      <div class="kpi ${r.objetivoClase || 'yellow'}">${r.objetivoDetalle || ""}</div>
      <hr>
      <div class="kpi">📈 Diferencia: <b>${formatNum(r.diferencia)} ton/ha</b></div>
      <div class="kpi">📊 Mejora vs control: <b>${formatPct(r.porcentaje)}</b></div>
      <div class="kpi">🌾 Rendimiento tratado: <b>${formatNum(r.rendTratado)} ton/ha</b></div>
      <div class="kpi">🌱 Rendimiento control: <b>${formatNum(r.rendControl)} ton/ha</b></div>
      <div class="kpi">📏 Superficie ensayo: <b>${formatNum(r.superficieEnsayoHa || 0)} ha</b></div>
      <div class="kpi">📏 Superficie potencial productor: <b>${Number(r.superficiePotencialHa || 0) > 0 ? formatNum(r.superficiePotencialHa) + " ha" : "N/D"}</b></div>
      <div class="kpi">💰 Margen incremental por ha: <b>${formatMoney(r.margenPorHa)}</b></div>
      <div class="kpi">💰 Margen incremental total del ensayo: <b>${formatMoney(r.margenEnsayo)}</b></div>
      <div class="kpi">🚀 Impacto potencial proyectado: <b>${Number(r.superficiePotencialHa || 0) > 0 ? formatMoney(r.proyeccionPotencial) : "N/D"}</b></div>
      <div class="kpi">💸 Costo total ensayo: <b>${formatMoney(r.costoTotal)}</b></div>
      <div class="kpi ${roiClass}">ROI real del ensayo: <b>${formatPct(Number(r.roi || 0) * 100)}</b> <span class="badge">Meta cultivo: ${formatPct(Number(r.metaROICultivo || 0.3) * 100)}</span></div>
      <hr>
      <div class="kpi">📊 Evaluación: <b>${r.evaluacion || ""}</b></div>
      <div class="kpi">🧠 Recomendación: <b>${r.recomendacion || ""}</b></div>
      <div class="kpi">🔁 Repetir ensayo: <b>${r.repetir || ""}</b></div>
    `;
  }

  function guardar(){
    if(!$("ensayoSelect").value){
      alert("Selecciona un ensayo.");
      return;
    }

    if(!tmp){
      alert("Primero calcula el resultado.");
      return;
    }

    const ensayoId = $("ensayoSelect").value;
    const nowIso = new Date().toISOString();
    const fechaEvaluacion = $("fechaEvaluacion").value || todayISO();

    const data = {
      id: editId || Date.now(),
      ensayo_id: ensayoId,
      fechaEvaluacion,
      fechaISO: editId ? (resultados.find(r => r.id === editId)?.fechaISO || nowIso) : nowIso,
      fechaActualizacionISO: nowIso,
      ...tmp
    };

    if(editId){
      resultados = resultados.map(r => r.id === editId ? data : r);
    } else {
      resultados.push(data);
    }

    saveData("resultados", resultados);
    render();
    limpiarFormulario();
    $("ensayoSelect").value = ensayoId;
    mostrarContextoEnsayo();
  }

  function editar(id){
    const r = resultados.find(x => x.id === id);
    if(!r) return;

    editId = id;
    $("modo").innerText = "Editar Evaluación";
    $("btnCancelar").style.display = "inline-block";
    $("ensayoSelect").value = r.ensayo_id;
    mostrarContextoEnsayo();
    cargarResultadoEnFormulario(r);
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function eliminar(id){
    if(!confirm("¿Eliminar esta evaluación?")) return;
    resultados = resultados.filter(r => r.id !== id);
    saveData("resultados", resultados);
    render();
    mostrarContextoEnsayo();
  }

  function render(){
    $("lista").innerHTML = "";

    const ordenados = resultados
      .slice()
      .sort((a,b) => {
        const fa = String(a.fechaEvaluacion || a.fechaActualizacionISO || "");
        const fb = String(b.fechaEvaluacion || b.fechaActualizacionISO || "");
        return fb.localeCompare(fa);
      });

    if(!ordenados.length){
      $("lista").innerHTML = `<p class="muted">Aún no hay evaluaciones guardadas.</p>`;
      return;
    }

    ordenados.forEach(r => {
      const e = ensayos.find(x => String(x.id) === String(r.ensayo_id)) || {};
      const roiClass = Number(r.roi || 0) >= Number(r.metaROICultivo || 0.3) ? "green" : Number(r.roi || 0) >= 0 ? "yellow" : "red";

      $("lista").innerHTML += `
        <div class="result-card">
          <h3>${ensayoLabel(e)} <span class="badge">Evaluación ${formatDate(r.fechaEvaluacion)}</span></h3>
          <p class="muted">Objetivo: ${r.objetivoEnsayo || "Sin objetivo"}</p>

          <p class="${r.objetivoClase || 'yellow'}">🎯 <b>${r.objetivoEstado || "N/D"}</b> — ${r.objetivoDetalle || ""}</p>

          <p>🌾 Rendimiento tratado: <b>${formatNum(r.rendTratado)} ton/ha</b></p>
          <p>🌱 Rendimiento control: <b>${formatNum(r.rendControl)} ton/ha</b></p>
          <p>📈 Diferencia: <b>${formatNum(r.diferencia)} ton/ha</b></p>
          <p>📊 Mejora: <b>${formatPct(r.porcentaje)}</b></p>

          <p>📏 Superficie ensayo: <b>${formatNum(r.superficieEnsayoHa || 0)} ha</b></p>
          <p>💰 Margen por ha: <b>${formatMoney(r.margenPorHa)}</b></p>
          <p>💰 Margen total ensayo: <b>${formatMoney(r.margenEnsayo)}</b></p>
          <p>🚀 Impacto potencial: <b>${Number(r.superficiePotencialHa || 0) > 0 ? formatMoney(r.proyeccionPotencial) : "N/D"}</b></p>

          <p>💸 Costo total: <b>${formatMoney(r.costoTotal)}</b></p>
          <p class="${roiClass}">ROI real: <b>${formatPct(Number(r.roi || 0) * 100)}</b></p>

          <hr>

          <p>📊 Evaluación: <b>${r.evaluacion || ""}</b></p>
          <p>🧠 Recomendación: <b>${r.recomendacion || ""}</b></p>
          <p>🔁 Repetir ensayo: <b>${r.repetir || ""}</b></p>
          <p>🏷 Calidad comercial: <b>${r.calidadComercial || "N/D"}</b></p>
          <p>🐛 Incidencia plaga: <b>${formatNum(r.incidenciaPlaga || 0)}%</b></p>

          <div class="actions">
            <button class="edit" onclick="editar(${r.id})">Editar</button>
            <button class="delete" onclick="eliminar(${r.id})">Eliminar</button>
          </div>
        </div>
      `;
    });
  }

  function exportarExcel(){
    const data = resultados.map(r => {
      const e = ensayos.find(x => String(x.id) === String(r.ensayo_id)) || {};
      return {
        "Folio Ensayo": e.id || "",
        "Cultivo": e.cultivo || "",
        "Variedad Tratada": e.variedad_tratada || "",
        "Productor": e.productor || "",
        "Región": e.region || "",
        "Fecha Evaluación": r.fechaEvaluacion || "",
        "Objetivo Ensayo": r.objetivoEnsayo || "",
        "Estado Objetivo": r.objetivoEstado || "",
        "Detalle Objetivo": r.objetivoDetalle || "",
        "Superficie Ensayo (ha)": r.superficieEnsayoHa || 0,
        "Superficie Potencial Productor (ha)": r.superficiePotencialHa || 0,
        "Rendimiento Control (ton/ha)": r.rendControl || 0,
        "Rendimiento Tratado (ton/ha)": r.rendTratado || 0,
        "Diferencia (ton/ha)": r.diferencia || 0,
        "Diferencia (kg/ha)": r.diferenciaKgHa || 0,
        "% Mejora": r.porcentaje || 0,
        "Calidad Comercial": r.calidadComercial || "",
        "Incidencia Plaga %": r.incidenciaPlaga || 0,
        "Semillas $": r.semillas || 0,
        "Insumos $": r.insumos || 0,
        "Material $": r.material || 0,
        "Horas Técnico": r.horas || 0,
        "Costo por Hora $": r.costoHora || 0,
        "Costo Horas $": r.costoHoras || 0,
        "Traslados $": r.traslados || 0,
        "Otros $": r.otros || 0,
        "Costo Total $": r.costoTotal || 0,
        "Precio por kg $": r.precio || 0,
        "Costo Producción por kg $": r.costoProduccion || 0,
        "Margen Unitario $": r.margenUnitario || 0,
        "Margen por ha $": r.margenPorHa || 0,
        "Margen total ensayo $": r.margenEnsayo || 0,
        "Impacto potencial proyectado $": r.proyeccionPotencial || 0,
        "Meta ROI Cultivo": r.metaROICultivo || 0,
        "ROI": r.roi || 0,
        "Evaluación": r.evaluacion || "",
        "Recomendación": r.recomendacion || "",
        "Repetir": r.repetir || "",
        "Fecha ISO": r.fechaISO || "",
        "Fecha Actualización ISO": r.fechaActualizacionISO || ""
      };
    });

    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Resultados");
    XLSX.writeFile(wb, "Resultados_Ensayos_Galera_Ajustado.xlsx");
  }

  $("ensayoSelect").addEventListener("change", () => {
    mostrarContextoEnsayo();
    $("kpis").innerHTML = "";
    tmp = null;
  });

  cargarEnsayos();
  $("fechaEvaluacion").value = todayISO();
  render();
</script>
</body>
</html>
