<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Bitácora de Ensayos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <style>
    :root{
      --bg:#0f172a; --card:#1e293b; --line:#334155; --text:#e2e8f0;
      --muted:#94a3b8; --primary:#38bdf8; --danger:#ef4444; --success:#22c55e; --warn:#f59e0b;
    }
    *{box-sizing:border-box}
    body{font-family:Arial,sans-serif;background:var(--bg);color:var(--text);padding:20px}
    h1{color:var(--primary);margin-top:0}
    .container{max-width:1200px;margin:auto}
    .card{background:var(--card);padding:20px;border-radius:12px;margin-bottom:20px;border:1px solid var(--line)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}
    input,select,button,textarea{width:100%;padding:10px;border-radius:8px;border:none}
    input,select,textarea{margin-top:6px;background:#fff;color:#111827}
    label{display:block;font-size:14px;color:var(--muted);margin-top:6px}
    button{background:var(--primary);cursor:pointer;font-weight:700}
    .nav{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
    .nav a{text-decoration:none}
    .nav button{width:auto}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .actions button{width:auto}
    .export{background:var(--success);color:#fff}
    .edit{background:var(--warn);color:#111827}
    .delete{background:var(--danger);color:#fff}
    #map{height:320px;border-radius:12px;border:1px solid var(--line);margin-top:10px}
    img{max-width:100%;border-radius:10px;margin-top:10px;border:1px solid var(--line)}
    .timeline-item{background:#0b1220;border:1px solid var(--line);border-radius:12px;padding:16px;margin-top:12px}
    .muted{color:var(--muted)}
  </style>
</head>
<body>
<div class="container">
  <div class="nav">
    <a href="index.html"><button>📋 Ensayos</button></a>
    <a href="bitacora.html"><button>📸 Bitácora</button></a>
    <a href="resultados.html"><button>📊 Resultados</button></a>
    <a href="pipeline.html"><button>🌱 Pipeline</button></a>
    <a href="tablero.html"><button>🧠 Tablero</button></a>
    <a href="inteligencia.html"><button>🚀 Inteligencia</button></a>
    <a href="innovacion.html"><button>🧬 Innovación</button></a>
  </div>

  <h1>📸 Bitácora de Ensayos</h1>

  <div class="card">
    <h2 id="modo">Nuevo Registro</h2>
    <div class="grid">
      <div>
        <label>Ensayo</label>
        <select id="ensayoSelect"></select>
      </div>
      <div>
        <label>Responsable</label>
        <input id="responsable" placeholder="Ej. Ing. López">
      </div>
      <div>
        <label>Etapa</label>
        <select id="etapa">
          <option value="Siembra">Siembra</option>
          <option value="Desarrollo">Desarrollo</option>
          <option value="Cosecha">Cosecha</option>
        </select>
      </div>
      <div>
        <label>Foto</label>
        <input type="file" id="foto" accept="image/*">
      </div>
    </div>

    <label>Observación</label>
    <textarea id="comentario" rows="4" placeholder="Describe el avance, hallazgos o incidencia observada..."></textarea>

    <label>Ubicación en mapa</label>
    <div id="map"></div>
    <p id="coords" class="muted"></p>

</html>
